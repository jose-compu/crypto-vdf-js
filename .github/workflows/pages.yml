name: Deploy website (GitHub Pages)

# Publishes website/ + TypeDoc + browser bundle to GitHub Pages.
# Requires repo Settings → Pages → Source: GitHub Actions (not "Deploy from branch").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library (Node)
        run: npm run build:node

      - name: Build promo site + API docs + demo bundle
        run: npm run website:build

      - name: Verify site artifact (not legacy README/Jekyll)
        run: |
          test -f site/index.html
          test -f site/.nojekyll
          test -f site/assets/js/vdf.min.js
          test -f site/assets/js/demo.js
          grep -q 'Live demo' site/index.html
          grep -q 'crypto-vdf' site/index.html
          ! grep -q '## Installation' site/index.html || (echo 'ERROR: index looks like README.md — wrong build' && exit 1)
          echo "Site artifact OK ($(wc -c < site/index.html) bytes index.html)"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

      - name: Published URL
        run: echo "Live at ${{ steps.deployment.outputs.page_url }}"
