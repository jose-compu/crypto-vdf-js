name: Bug report
description: Report incorrect behavior or a regression
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please search existing issues first.

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 1.0.6
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Node.js
        - Browser
        - Both
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime version
      description: Node version or browser name/version
      placeholder: e.g. Node 20.11, Chrome 120
    validations:
      required: true

  - type: dropdown
    id: scheme
    attributes:
      label: VDF scheme
      options:
        - Wesolowski
        - Pietrzak
        - Both / unsure
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: Minimal code or script
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
